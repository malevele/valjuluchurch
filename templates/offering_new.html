{% extends 'base.html' %}
{% block title %}新增奉獻點算表{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="d-flex align-items-center mb-3 gap-2">
      <a href="{% if preset_unit %}{{ url_for('cashbook', unit_id=preset_unit) }}{% else %}{{ url_for('offering_list') }}{% endif %}"
         class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h5 class="mb-0 text-success"><i class="bi bi-cash-stack"></i> 新增奉獻點算表</h5>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-header bg-success text-white">
        <h5 class="mb-0"><i class="bi bi-cash-stack"></i> 奉獻點算表</h5>
        <small>台灣基督長老教會瓦酪露教會 · 統一編號 87878809</small>
      </div>
      <form method="post">
        <div class="card-body">
          <!-- 第一列：日期 | 傳票編號 | 單位 -->
          <div class="row g-3 mb-3">
            <div class="col-md-3">
              <label class="form-label fw-semibold">日期 <span class="text-danger">*</span></label>
              <input type="date" name="date" class="form-control" value="{{ preset_date or today }}" required>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">傳票編號
                <span class="text-muted small fw-normal">（留空自動產生）</span>
              </label>
              <input type="text" name="attachment_no" class="form-control font-monospace"
                     value="{{ preset_voucher }}" placeholder="{{ suggested_no }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">聚會 / 單位名稱 <span class="text-danger">*</span></label>
              <select name="meeting_type" class="form-select" required>
                <option value="">— 請選擇 —</option>
                {% for u in units %}
                <option value="{{ u.name }}"
                  {% if u.id == preset_unit %}selected{% endif %}>{{ u.name }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <!-- 第二列：收入科目 | 摘要 -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">收入科目 <span class="text-danger">*</span></label>
              <select name="account_id" class="form-select" required>
                <option value="">— 請選擇科目 —</option>
                {% for a in income_accounts %}
                <option value="{{ a.id }}" {% if a.id|string == preset_account|string %}selected{% endif %}>{{ a.code }} {{ a.name }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">摘要 <span class="text-danger">*</span></label>
              <input type="text" name="description" class="form-control"
                     value="{{ preset_desc }}" placeholder="例：4月第一主日奉獻" required>
              <div class="form-text">此摘要將同步顯示於收入傳票與現金簿</div>
            </div>
          </div>

          <!-- 第三列：點算總額 -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">點算總額 <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text bg-success text-white">NT$</span>
                <input type="number" name="total_cash" class="form-control form-control-lg fw-bold text-success"
                       min="0" step="1" placeholder="0" value="{{ preset_amount }}" required>
              </div>
            </div>
          </div>

          <!-- 第四列：點算人一 | 點算人二 -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">點算人一 <span class="text-danger">*</span></label>
              <input type="text" name="counter1" class="form-control" placeholder="姓名" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">點算人二 <span class="text-danger">*</span></label>
              <input type="text" name="counter2" class="form-control" placeholder="姓名（須兩位簽署）" required>
            </div>
          </div>

          <!-- 第五列：備註 -->
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">備註 <span class="text-muted small">（選填）</span></label>
              <input type="text" name="notes" class="form-control">
            </div>
          </div>

          <div class="alert alert-info mt-3 small mb-0">
            <i class="bi bi-info-circle"></i>
            點算須在<strong>透明、公開環境</strong>下由<strong>至少兩位同工</strong>進行。
            儲存後將自動建立對應<strong>收入傳票</strong>並加入現金簿。
          </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
          <a href="{% if preset_unit %}{{ url_for('cashbook', unit_id=preset_unit) }}{% else %}{{ url_for('offering_list') }}{% endif %}"
             class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> 返回
          </a>
          <div class="d-flex gap-2">
            <button type="submit" name="_continue" value="1" class="btn btn-success">
              <i class="bi bi-save"></i> 儲存
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
