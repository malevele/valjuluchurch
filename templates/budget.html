{% extends 'base.html' %}
{% block title %}年度預算{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0"><i class="bi bi-calculator text-primary"></i> 年度預算設定</h4>
  <form class="d-flex gap-2" method="get">
    <select name="year" class="form-select form-select-sm" style="width:auto" onchange="this.form.submit()">
      {% for y in years %}<option value="{{ y }}" {% if y==year %}selected{% endif %}>{{ y }}年</option>{% endfor %}
    </select>
  </form>
</div>

<form method="post" action="{{ url_for('budget_save') }}">
  <input type="hidden" name="year" value="{{ year }}">
  <div class="row g-3">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-success-subtle">
          <h6 class="mb-0 text-success"><i class="bi bi-arrow-up-circle"></i> 收入預算</h6>
        </div>
        <div class="table-responsive">
          <table class="table table-sm mb-0">
            <thead class="table-light">
              <tr><th>科目</th><th class="text-end">預算金額</th></tr>
            </thead>
            <tbody>
              {% for a in income_accounts %}
              <tr>
                <td class="small">{{ a.name }}</td>
                <td>
                  <div class="input-group input-group-sm">
                    <span class="input-group-text">NT$</span>
                    <input type="number" name="budget_{{ a.id }}" class="form-control text-end"
                           min="0" step="100"
                           value="{{ budgets.get(a.id, 0) | int }}">
                  </div>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-danger-subtle">
          <h6 class="mb-0 text-danger"><i class="bi bi-arrow-down-circle"></i> 支出預算</h6>
        </div>
        <div class="table-responsive">
          <table class="table table-sm mb-0">
            <thead class="table-light">
              <tr><th>科目</th><th class="text-end">預算金額</th></tr>
            </thead>
            <tbody>
              {% for a in expense_accounts %}
              <tr>
                <td class="small">{{ a.name }}</td>
                <td>
                  <div class="input-group input-group-sm">
                    <span class="input-group-text">NT$</span>
                    <input type="number" name="budget_{{ a.id }}" class="form-control text-end"
                           min="0" step="100"
                           value="{{ budgets.get(a.id, 0) | int }}">
                  </div>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <div class="mt-3 text-end">
    <button type="submit" class="btn btn-primary">
      <i class="bi bi-save"></i> 儲存 {{ year }}年預算
    </button>
  </div>
</form>
{% endblock %}
